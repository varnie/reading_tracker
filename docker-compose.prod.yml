services:
  postgres:
    image: postgres:16-alpine
    container_name: reading_tracker_prod_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reading_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-reading_tracker}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: ${POSTGRES_CPU_LIMIT:-1}
          memory: ${POSTGRES_MEMORY_LIMIT:-512M}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: reading_tracker_prod_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: ${REDIS_CPU_LIMIT:-0.5}
          memory: ${REDIS_MEMORY_LIMIT:-256M}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: reading-tracker-api:latest
    container_name: reading_tracker_prod_api
    ports:
      - "${API_PORT:-8001}:8000"
    environment:
      APP_ENV: production
      APP_VERSION: ${APP_VERSION:-v1}
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-reading_tracker}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-10}
      DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-20}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-100}
      CORS_ORIGINS: ${CORS_ORIGINS}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@readingtracker.app}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Reading Tracker}
      SMTP_TLS: ${SMTP_TLS:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: ${API_CPU_LIMIT:-2}
          memory: ${API_MEMORY_LIMIT:-512M}
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: reading-tracker-worker:latest
    container_name: reading_tracker_prod_worker
    environment:
      APP_ENV: production
      APP_VERSION: ${APP_VERSION:-v1}
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-reading_tracker}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@readingtracker.app}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Reading Tracker}
      SMTP_TLS: ${SMTP_TLS:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: ${WORKER_CPU_LIMIT:-1}
          memory: ${WORKER_MEMORY_LIMIT:-512M}
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  beat:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: reading-tracker-worker:latest
    container_name: reading_tracker_prod_beat
    command: [".venv/bin/celery", "-A", "app.tasks.celery_app", "beat", "--loglevel=info"]
    environment:
      APP_ENV: production
      APP_VERSION: ${APP_VERSION:-v1}
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-reading_tracker}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@readingtracker.app}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Reading Tracker}
      SMTP_TLS: ${SMTP_TLS:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: ${BEAT_CPU_LIMIT:-0.5}
          memory: ${BEAT_MEMORY_LIMIT:-256M}
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  postgres_data:
  redis_data:
